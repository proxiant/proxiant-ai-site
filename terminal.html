    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #0a0d14;
      color: #e8eaed;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2f3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3f4a; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }

    /* Ticker tape animation */
    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(38, 166, 154, 0.3); }
      50% { box-shadow: 0 0 12px 2px rgba(38, 166, 154, 0.15); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .fade-up { animation: fadeInUp 0.4s ease-out both; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }
    .stagger-6 { animation-delay: 0.3s; }

    .skeleton {
      background: linear-gradient(90deg, #1a1f2e 25%, #252a3a 50%, #1a1f2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    /* Tooltip */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap;
      background: #1e2330; color: #9aa0b0; border: 1px solid #2a2f3a;
      z-index: 1000; pointer-events: none;
    }

    /* Mono numbers */
    .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

    /* Table rows */
    .signal-row { transition: background 0.15s ease; }
    .signal-row:hover { background: #141825 !important; }

    .glow-green { text-shadow: 0 0 8px rgba(38, 166, 154, 0.4); }
    .glow-red { text-shadow: 0 0 8px rgba(239, 83, 80, 0.4); }

    // ---- API CLIENT ----
    async function apiGet(path) {
      if (!API_BASE) return null;
      try {
        const res = await fetch(`${API_BASE}${path}`);
        if (!res.ok) throw new Error(`${res.status}`);
        return await res.json();
      } catch (e) { console.warn(`API GET ${path}:`, e); return null; }
    }
    async function apiPost(path, body) {
      if (!API_BASE) return null;
      try {
        const res = await fetch(`${API_BASE}${path}`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`${res.status}`);
        return await res.json();
      } catch (e) { console.warn(`API POST ${path}:`, e); return null; }
    }

    // Generate OHLC candle data
    function generateCandleData(days = 120) {
      const data = [];
      let price = 215;
      const now = Date.now();
      for (let i = days; i >= 0; i--) {
        const time = Math.floor((now - i * 86400000) / 1000);
        const volatility = 3 + Math.random() * 4;
        const trend = Math.sin(i / 20) * 2;
        const open = price + (Math.random() - 0.48) * volatility + trend;
        const close = open + (Math.random() - 0.47) * volatility;
        const high = Math.max(open, close) + Math.random() * volatility * 0.5;
        const low = Math.min(open, close) - Math.random() * volatility * 0.5;
        data.push({
          time,
          open: Math.round(open * 100) / 100,
          high: Math.round(high * 100) / 100,
          low: Math.round(low * 100) / 100,
          close: Math.round(close * 100) / 100,
        });
        price = close;
      }
      return data;
    }

    function generateVolumeData(candles) {
      return candles.map(c => ({

        value: Math.round(1000000 + Math.random() * 5000000),

        STRONG_BUY: { bg: C.bullishDim, color: C.bullish, border: C.bullishMid },
        BUY: { bg: "rgba(38,166,154,0.08)", color: "#5ec4b6", border: "rgba(38,166,154,0.15)" },
        HOLD: { bg: "rgba(107,114,128,0.08)", color: C.textMuted, border: "rgba(107,114,128,0.15)" },
        SELL: { bg: "rgba(239,83,80,0.08)", color: "#f09090", border: "rgba(239,83,80,0.15)" },
        STRONG_SELL: { bg: C.bearishDim, color: C.bearish, border: C.bearishMid },
      };
      const c = config[signal] || config.HOLD;
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 4,
          padding: "3px 10px", borderRadius: 4, fontSize: 10, fontWeight: 700,

    // ---- CONFIDENCE BAR ----
    const ConfidenceBar = ({ value }) => {
      const pct = (value * 100);

      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 100 }}>
          <div style={{ flex: 1, height: 4, borderRadius: 2, background: C.border, overflow: "hidden" }}>
            <div style={{
              width: `${pct}%`, height: "100%", borderRadius: 2, background: color,
              transition: "width 0.6s ease",
            }} />
          </div>
          <span className="mono" style={{ fontSize: 11, color: C.textSoft, minWidth: 32 }}>{pct.toFixed(0)}%</span>
        </div>
      );
    };

    // ---- TOGGLE ----
    const Toggle = ({ on, onChange }) => (
      <div onClick={onChange} style={{
        width: 36, height: 20, borderRadius: 10, cursor: "pointer",
        background: on ? C.bullish : C.borderLight, transition: "background 0.2s",
        position: "relative", flexShrink: 0,
      }}>
        <div style={{
          width: 16, height: 16, borderRadius: 8, background: "#fff",
          position: "absolute", top: 2, left: on ? 18 : 2,
          transition: "left 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
          boxShadow: "0 1px 3px rgba(0,0,0,0.3)",
        }} />

    // ---- SECTION HEADER ----
    const SectionHeader = ({ title, subtitle, action, icon }) => (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {icon && <span style={{ color: C.textDim }}>{icon}</span>}
          <div>
            <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600, color: C.text, letterSpacing: -0.2 }}>{title}</h2>
            {subtitle && <p style={{ margin: "2px 0 0", fontSize: 11, color: C.textDim }}>{subtitle}</p>}
          </div>
        </div>
        {action}
      </div>
    );

    // ---- CANDLESTICK CHART ----
    const CandlestickChart = memo(({ ticker = "COIN", height = 420 }) => {
      const containerRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!containerRef.current) return;
        const container = containerRef.current;

        const chart = LightweightCharts.createChart(container, {
          width: container.clientWidth,
          height: height,
          layout: {
            background: { type: 'solid', color: 'transparent' },
            textColor: C.textMuted,
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 11,
          },
          grid: {
            vertLines: { color: C.border, style: 1 },
            horzLines: { color: C.border, style: 1 },
          },
          crosshair: {
            mode: LightweightCharts.CrosshairMode.Normal,
            vertLine: { width: 1, color: C.borderLight, style: 2, labelBackgroundColor: C.accent },
            horzLine: { width: 1, color: C.borderLight, style: 2, labelBackgroundColor: C.accent },
          },
          rightPriceScale: {
            borderColor: C.border,
            scaleMargins: { top: 0.1, bottom: 0.2 },
          },
          timeScale: {
            borderColor: C.border,
            timeVisible: false,
            rightOffset: 5,
          },
          handleScroll: { vertTouchDrag: false },
        });

        const candleSeries = chart.addCandlestickSeries({
          upColor: C.bullish,
          downColor: C.bearish,
          borderUpColor: C.bullish,
          borderDownColor: C.bearish,
          wickUpColor: C.bullish,
          wickDownColor: C.bearish,
        });

        const candles = generateCandleData(120);
        candleSeries.setData(candles);

        // Volume
        const volumeSeries = chart.addHistogramSeries({
          priceFormat: { type: 'volume' },
          priceScaleId: 'volume',
        });
        chart.priceScale('volume').applyOptions({
          scaleMargins: { top: 0.8, bottom: 0 },
        });
        volumeSeries.setData(generateVolumeData(candles));

        // SMA overlay
        const sma20 = [];
        for (let i = 19; i < candles.length; i++) {
          const sum = candles.slice(i - 19, i + 1).reduce((a, c) => a + c.close, 0);
          sma20.push({ time: candles[i].time, value: sum / 20 });
        }
        const smaSeries = chart.addLineSeries({
          color: C.accent,
          lineWidth: 1,
          priceLineVisible: false,
          lastValueVisible: false,
          crosshairMarkerVisible: false,
        });
        smaSeries.setData(sma20);

        chart.timeScale().fitContent();
        chartRef.current = chart;

        const ro = new ResizeObserver(() => {
          if (container.clientWidth > 0) chart.applyOptions({ width: container.clientWidth });
        });
        ro.observe(container);

        return () => { ro.disconnect(); chart.remove(); };
      }, [height]);

      return (
        <div style={{ background: C.card, borderRadius: 8, border: `1px solid ${C.border}`, overflow: "hidden" }}>
          <div style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "10px 16px", borderBottom: `1px solid ${C.border}`,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: C.accent }}>{Icons.candlestick(16)}</span>
              <span className="mono" style={{ fontSize: 14, fontWeight: 700, letterSpacing: 0.5 }}>{ticker}</span>
              <span className="mono" style={{ fontSize: 13, color: C.textSoft }}>$215.30</span>
              <span className="mono" style={{ fontSize: 12, color: C.bearish, display: "flex", alignItems: "center", gap: 2 }}>
                {Icons.trendDown(10)} -1.10%
              </span>
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {["1D", "1W", "1M", "3M", "1Y", "ALL"].map(tf => (
                <button key={tf} style={{
                  padding: "4px 10px", borderRadius: 4, border: "none", fontSize: 11, fontWeight: 600,
                  background: tf === "3M" ? C.accentDim : "transparent",
                  color: tf === "3M" ? C.accent : C.textMuted,
                  fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5,
                }}>{tf}</button>
              ))}
            </div>
          </div>
          <div ref={containerRef} style={{ width: "100%" }} />
        </div>
      );

    // ---- STRATEGY PANEL ----
    const StrategyPanel = ({ strategies, onToggle }) => {

                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  padding: "8px 10px", marginBottom: 2, borderRadius: 6,
                  background: s.active ? C.surfaceAlt : "transparent",
                  border: `1px solid ${s.active ? (STRAT_COLORS[s.name] || C.border) + "30" : "transparent"}`,
                  transition: "all 0.2s",
                }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{
                        width: 6, height: 6, borderRadius: 3,
                        background: STRAT_COLORS[s.name] || C.textMuted,
                        boxShadow: s.active ? `0 0 6px ${STRAT_COLORS[s.name] || C.textMuted}40` : "none",

                      {s.active && <span className="mono" style={{ fontSize: 10, color: C.textDim }}>{(s.weight||1).toFixed(1)}x</span>}

                    <div style={{ fontSize: 10, color: C.textDim, marginTop: 1, marginLeft: 12, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.description}</div>
                  </div>
                  <Toggle on={s.active} onChange={() => onToggle(s.name)} />

              ))}
            </div>
          ))}
        </div>
      );
    };

    // ---- MARKET HEATMAP ----
    const MarketHeatmap = ({ signals }) => {
      const items = signals.length > 0 ? signals : SIGNALS_DATA;
      return (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(80px, 1fr))", gap: 4 }}>
          {items.map(s => {
            const ticker = s.Ticker || s.ticker;
            const change = s.Change || s.change || 0;

            return (
              <div key={ticker} style={{
                padding: "10px 6px", borderRadius: 6, textAlign: "center",
                background: up
                  ? `rgba(38,166,154,${Math.min(0.35, Math.abs(change) * 0.07)})`

                border: `1px solid ${up ? C.bullishDim : C.bearishDim}`,

                cursor: "pointer",
              }}>
                <div className="mono" style={{ fontSize: 11, fontWeight: 700, color: C.text, letterSpacing: 0.5 }}>{ticker}</div>
                <div className="mono" style={{ fontSize: 10, fontWeight: 600, color: up ? C.bullish : C.bearish, marginTop: 2 }}>
                  {fmtPct(change)}
                </div>
              </div>
            );
          })}
        </div>
      );
    };

    // ---- TRADE PANEL ----
    const TradePanel = ({ portfolio, watchlist, onTrade }) => {
      const [ticker, setTicker] = useState("");
      const [action, setAction] = useState("BUY");
      const [amount, setAmount] = useState("");
      const [executing, setExecuting] = useState(false);

      const execute = async () => {
        if (!ticker || !amount) return;
        setExecuting(true);
        const res = await apiPost("/api/trade", { ticker, action, dollar_amount: parseFloat(amount) });
        if (onTrade) onTrade(res);
        setExecuting(false);
        setAmount("");
      };

      const positions = portfolio?.state?.positions || {};
      const cash = portfolio?.state?.cash ?? 100000;

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16, maxWidth: 1200 }}>
          <SectionHeader title="Paper Trading" subtitle="Execute against your paper portfolio" icon={Icons.wallet(16)} />

          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <MetricCard label="Cash Balance" value={fmtK(cash)} color={C.bullish} icon={Icons.wallet(14)} />
            <MetricCard label="Positions" value={Object.keys(positions).length} sub="open" icon={Icons.activity(14)} />
            <MetricCard label="Total Trades" value={portfolio?.state?.trades?.length || 0} icon={Icons.zap(14)} />
          </div>

          {/* Trade Entry */}
          <div style={{ background: C.card, borderRadius: 8, padding: 18, border: `1px solid ${C.border}` }}>
            <SectionHeader title="Execute Trade" icon={Icons.play(14)} />
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end", flexWrap: "wrap" }}>
              <div style={{ minWidth: 120 }}>
                <label style={{ fontSize: 10, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 4 }}>Side</label>
                <div style={{ display: "flex", gap: 4 }}>
                  {["BUY", "SELL"].map(a => (
                    <button key={a} onClick={() => setAction(a)} style={{
                      flex: 1, padding: "8px 12px", borderRadius: 6, fontSize: 12, fontWeight: 700,
                      border: `1px solid ${action === a ? (a === "BUY" ? C.bullish : C.bearish) + "60" : C.border}`,
                      background: action === a ? (a === "BUY" ? C.bullishDim : C.bearishDim) : C.surface,
                      color: action === a ? (a === "BUY" ? C.bullish : C.bearish) : C.textMuted,
                      fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5,
                    }}>{a}</button>
                  ))}
                </div>
              </div>
              <div style={{ flex: 2, minWidth: 200 }}>
                <label style={{ fontSize: 10, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 4 }}>Symbol</label>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {(watchlist || []).slice(0, 8).map(w => (
                    <button key={w.ticker} onClick={() => setTicker(w.ticker)} style={{
                      padding: "5px 10px", borderRadius: 4, fontSize: 11, fontWeight: 600,
                      border: `1px solid ${ticker === w.ticker ? C.accent : C.border}`,
                      background: ticker === w.ticker ? C.accentDim : "transparent",
                      color: ticker === w.ticker ? C.accent : C.textMuted,
                      fontFamily: "'JetBrains Mono', monospace",
                    }}>{w.ticker}</button>
                  ))}
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 110 }}>
                <label style={{ fontSize: 10, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 4 }}>Amount ($)</label>
                <input value={amount} onChange={e => setAmount(e.target.value)} type="number" placeholder="1,000"
                  style={{
                    width: "100%", padding: "8px 12px", borderRadius: 6,
                    border: `1px solid ${C.border}`, background: C.surface, color: C.text,
                    fontSize: 13, outline: "none", fontFamily: "'JetBrains Mono', monospace",
                  }} />
              </div>
              <button onClick={execute} disabled={executing || !ticker || !amount} style={{
                padding: "9px 20px", borderRadius: 6, border: "none", fontSize: 12, fontWeight: 700,
                background: action === "BUY" ? C.bullish : C.bearish, color: "#fff",
                opacity: (!ticker || !amount || executing) ? 0.4 : 1,
                display: "flex", alignItems: "center", gap: 6,
                fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5,
              }}>{executing ? <Spinner size={14}/> : null}{action} {ticker || "..."}</button>
            </div>
          </div>

          {/* Positions */}
          {Object.keys(positions).length > 0 && (
            <div style={{ background: C.card, borderRadius: 8, border: `1px solid ${C.border}`, overflow: "hidden" }}>
              <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.border}` }}>
                <SectionHeader title="Open Positions" icon={Icons.activity(14)} />
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                    {["Symbol", "Shares", "Avg Cost", "Value"].map(h => (
                      <th key={h} style={{ padding: "10px 16px", textAlign: "left", color: C.textDim, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.8 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(positions).map(([t, p]) => (
                    <tr key={t} className="signal-row" style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td className="mono" style={{ padding: "10px 16px", fontWeight: 700, color: C.accent }}>{t}</td>
                      <td className="mono" style={{ padding: "10px 16px" }}>{p.shares}</td>
                      <td className="mono" style={{ padding: "10px 16px" }}>${p.avg_cost.toFixed(2)}</td>
                      <td className="mono" style={{ padding: "10px 16px", fontWeight: 600, color: C.bullish }}>${(p.shares * p.avg_cost).toFixed(2)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    };

    // ---- LLM PANEL ----
    const LLMPanel = () => {
      const [provider, setProvider] = useState("claude");
      const [model, setModel] = useState("claude-sonnet-4-6");
      const [prompt, setPrompt] = useState("");
      const [response, setResponse] = useState("");
      const [loading, setLoading] = useState(false);

      const providers = {
        claude: { models: ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5"], label: "Anthropic" },
        openai: { models: ["gpt-4o", "gpt-4-turbo", "gpt-3.5-turbo"], label: "OpenAI" },
        ollama: { models: ["llama3", "llama3.1", "mistral", "mixtral", "phi", "deepseek-coder"], label: "Ollama" },
        gemini: { models: ["gemini-1.5-pro", "gemini-pro"], label: "Gemini" },
        custom: { models: ["any"], label: "Custom" },
      };

      const analyze = async () => {
        if (!prompt.trim()) return;
        setLoading(true);
        const res = await apiPost("/api/llm/analyze", { prompt, ticker: null, include_portfolio: false });
        setResponse(res?.response || res?.error || "Configure an API key on the server to enable AI analysis.");
        setLoading(false);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "flex", gap: 6 }}>
            {Object.entries(providers).map(([key, val]) => (
              <button key={key} onClick={() => { setProvider(key); setModel(val.models[0]); }}
                style={{
                  padding: "8px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600,
                  border: `1px solid ${provider === key ? C.accent : C.border}`,
                  background: provider === key ? C.accentDim : "transparent",
                  color: provider === key ? C.accent : C.textMuted,
                  letterSpacing: 0.3,
                }}>{val.label}</button>
            ))}
          </div>

          <div>
            <label style={{ fontSize: 10, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 4 }}>Model</label>
            <select value={model} onChange={e => setModel(e.target.value)}
              style={{
                width: "100%", padding: "8px 12px", borderRadius: 6,
                border: `1px solid ${C.border}`, background: C.surface, color: C.text,
                fontSize: 12, fontFamily: "'JetBrains Mono', monospace",
              }}>
              {providers[provider].models.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>

          {provider === "ollama" && (
            <div style={{ padding: 10, borderRadius: 6, background: C.accentDim, border: `1px solid ${C.accent}25`, fontSize: 12, color: C.accent }}>
              Ollama runs locally \u2014 no API key needed. Ensure it's running on localhost:11434
            </div>
          )}

          <div>
            <label style={{ fontSize: 10, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.8, display: "block", marginBottom: 4 }}>Market Analysis Prompt</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={prompt} onChange={e => setPrompt(e.target.value)}
                onKeyDown={e => e.key === "Enter" && analyze()}
                placeholder="Which pullback stocks have the best risk/reward?"
                style={{
                  flex: 1, padding: "9px 12px", borderRadius: 6,
                  border: `1px solid ${C.border}`, background: C.surface, color: C.text,
                  fontSize: 12, outline: "none",
                }} />
              <button onClick={analyze} disabled={loading} style={{
                padding: "9px 18px", borderRadius: 6, border: "none",
                background: C.accent, color: "#fff", fontSize: 12, fontWeight: 700,
                opacity: loading ? 0.5 : 1, display: "flex", alignItems: "center", gap: 6,
                letterSpacing: 0.3,
              }}>{loading ? <Spinner size={14}/> : Icons.brain(14)} Analyze</button>
            </div>
          </div>

          {response && (
            <div style={{
              padding: 14, borderRadius: 6, background: C.surface,
              border: `1px solid ${C.border}`, fontSize: 12, color: C.textSoft,
              lineHeight: 1.7, whiteSpace: "pre-wrap",
              fontFamily: "'DM Sans', sans-serif",
            }}>{response}</div>
          )}
        </div>
      );
    };

    // ============================================================
    // MAIN APP
    // ============================================================
    function App() {
      const [tab, setTab] = useState("dashboard");
      const [strategies, setStrategies] = useState([]);
      const [signals, setSignals] = useState([]);
      const [portfolio, setPortfolio] = useState(null);
      const [watchlist, setWatchlist] = useState([]);
      const [backtest, setBacktest] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [connected, setConnected] = useState(false);
      const [loading, setLoading] = useState(true);
      const [scanning, setScanning] = useState(false);
      const [selectedTicker, setSelectedTicker] = useState("COIN");

      const equity = useRef(EQUITY).current;

      const loadData = useCallback(async () => {
        const [health, strats, sigs, port, wl] = await Promise.all([
          apiGet("/api/health"),
          apiGet("/api/strategies"),
          apiGet("/api/scan"),
          apiGet("/api/portfolio"),
          apiGet("/api/watchlist"),
        ]);
        setConnected(!!health);
        if (strats?.strategies) setStrategies(strats.strategies);
        if (sigs?.signals) setSignals(sigs.signals);
        if (port) setPortfolio(port);
        if (wl?.watchlist) setWatchlist(wl.watchlist);
        setLoading(false);
      }, []);

      useEffect(() => { loadData(); }, [loadData]);
      useEffect(() => {
        const id = setInterval(loadData, 30000);
        return () => clearInterval(id);
      }, [loadData]);

      const toggleStrategy = async (name) => {
        const s = strategies.find(x => x.name === name);
        if (!s) return;
        setStrategies(prev => prev.map(x => x.name === name ? { ...x, active: !x.active } : x));
        await apiPost("/api/strategies/activate", { name, active: !s.active });
      };

      const runScan = async () => {
        setScanning(true);
        const res = await apiGet("/api/scan");
        if (res?.signals) setSignals(res.signals);
        setScanning(false);
      };

      const runBacktest = async () => {
        const res = await apiGet("/api/backtest?capital=100000&days=504");
        if (res) setBacktest(res);
      };

      const strats = strategies.length > 0 ? strategies : STRATEGIES_DATA;
      const sigs = signals.length > 0 ? signals : SIGNALS_DATA;
      const activeCount = strats.filter(s => s.active).length;
      const buySignals = sigs.filter(s => (s.Signal || s.signal || "").includes("BUY")).length;
      const strongBuys = sigs.filter(s => (s.Signal || s.signal) === "STRONG_BUY").length;
      const holdSignals = sigs.length - buySignals;

      const tabs = [
        { id: "dashboard", label: "Overview", icon: Icons.chart },
        { id: "signals", label: "Signals", icon: Icons.zap },
        { id: "trade", label: "Trade", icon: Icons.wallet },
        { id: "backtest", label: "Backtest", icon: Icons.activity },

                      <div style={{ background: C.card, borderRadius: 8, padding: 18, border: `1px solid ${C.border}` }}>
                        <SectionHeader title="Supported Providers" icon={Icons.brain(14)} />
                        {[
                          { name: "Anthropic Claude", models: "Opus, Sonnet, Haiku", color: C.orange },
                          { name: "OpenAI", models: "GPT-4o, GPT-4-Turbo", color: C.bullish },
                          { name: "Ollama (Local)", models: "Llama 3, Mistral, Phi", color: C.purple },
                          { name: "Google Gemini", models: "Gemini 1.5 Pro", color: C.accent },
                          { name: "Custom Endpoint", models: "OpenAI-compatible", color: C.cyan },
                        ].map(p => (
                          <div key={p.name} style={{
                            padding: "10px 0", borderBottom: `1px solid ${C.border}`,
                            display: "flex", justifyContent: "space-between", alignItems: "center",
                          }}>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
                                <span style={{ width: 6, height: 6, borderRadius: 3, background: p.color }} />
                                {p.name}
                              </div>
                              <div className="mono" style={{ color: C.textDim, fontSize: 10, marginTop: 2, letterSpacing: 0.3 }}>{p.models}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
